<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おもいでガチャ — Memory Gacha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --deep:   #0B3247;  /* East China Sea at dusk */
    --sea:    #16577A;
    --aqua:   #5BC8CE;  /* Ryukyu glass */
    --foam:   #C9EDE7;
    --sand:   #F6EFE3;
    --coral:  #FF8B6A;
    --coral-d:#E06A4B;
    --sun:    #F0C987;
    --ink:    #14384C;
    --shell:  #FFFBF3;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    font-family:'Quicksand','Zen Maru Gothic',system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--sand) 0%, #EAF3EE 34%, var(--foam) 58%, var(--aqua) 100%);
    min-height:100vh;
    overflow-x:hidden;
    display:flex; flex-direction:column; align-items:center;
  }

  /* ---- seigaiha wave pattern along the bottom (the sea) ---- */
  .sea-floor{
    position:fixed; left:0; right:0; bottom:0; height:26vh; min-height:150px;
    background-image:radial-gradient(circle at 50% 0%, transparent 36%, rgba(255,255,255,.35) 37%, rgba(255,255,255,.35) 41%, transparent 42%,
      transparent 55%, rgba(255,255,255,.28) 56%, rgba(255,255,255,.28) 60%, transparent 61%,
      transparent 74%, rgba(255,255,255,.2) 75%, rgba(255,255,255,.2) 79%, transparent 80%);
    background-size:110px 96px;
    background-position:0 100%, 55px 148px;
    opacity:.8; pointer-events:none; z-index:0;
    mask-image:linear-gradient(180deg,transparent, black 45%);
    -webkit-mask-image:linear-gradient(180deg,transparent, black 45%);
  }
  .sea-floor::after{
    content:""; position:absolute; inset:0;
    background-image:inherit; background-size:110px 96px; background-position:55px 48px;
    opacity:.5;
  }

  /* ---- drifting bubbles ---- */
  .bubble{ position:fixed; bottom:-30px; border-radius:50%;
    border:2px solid rgba(255,255,255,.55); background:rgba(255,255,255,.12);
    animation:rise linear infinite; pointer-events:none; z-index:0; }
  @keyframes rise{ to{ transform:translateY(-110vh) translateX(4vw); opacity:0; } }

  header{ text-align:center; padding:34px 20px 6px; z-index:2; }
  .eyebrow{
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:13px;
    letter-spacing:.42em; color:var(--sea); text-transform:uppercase;
  }
  .eyebrow .jp{ letter-spacing:.3em; }
  h1{
    font-family:'Zen Maru Gothic',sans-serif; font-weight:900;
    font-size:clamp(30px,6vw,44px); color:var(--ink); margin-top:6px;
  }
  h1 .accent{ color:var(--coral); }
  .sub{ font-size:15px; color:var(--sea); margin-top:8px; font-weight:500; }

  /* ================= MACHINE ================= */
  .stage{ position:relative; z-index:2; margin-top:18px; }
  .machine{ width:min(320px,84vw); position:relative; transition:transform .1s; }
  .machine.shake{ animation:shake .5s ease; }
  @keyframes shake{
    20%{ transform:rotate(-2deg);} 40%{ transform:rotate(2.4deg);}
    60%{ transform:rotate(-2deg);} 80%{ transform:rotate(1.2deg);}
  }

  /* ---- capsule that drops down the front ---- */
  #dropCapsule{
    position:absolute; left:50%; width:64px; height:64px; margin-left:-32px;
    top:52%; opacity:0; z-index:3; pointer-events:none;
  }
  #dropCapsule.dropping{ animation:drop .9s cubic-bezier(.34,1.4,.64,1) forwards; }
  @keyframes drop{
    0%{ opacity:0; transform:translateY(0) rotate(0); }
    12%{ opacity:1; }
    70%{ transform:translateY(158px) rotate(160deg); }
    84%{ transform:translateY(140px) rotate(200deg); }
    100%{ opacity:1; transform:translateY(152px) rotate(220deg); }
  }

  .press-hint{
    text-align:center; margin:16px 0 8px; font-weight:600; color:var(--sea); font-size:14px;
  }
  button.turn{
    display:block; margin:0 auto; cursor:pointer; border:none;
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:18px;
    color:#fff; background:linear-gradient(180deg,var(--coral),var(--coral-d));
    padding:15px 44px; border-radius:999px;
    box-shadow:0 6px 0 #B84E33, 0 14px 26px rgba(224,106,75,.35);
    transition:transform .12s, box-shadow .12s; letter-spacing:.06em;
  }
  button.turn:hover{ transform:translateY(-1px); }
  button.turn:active{ transform:translateY(4px); box-shadow:0 2px 0 #B84E33, 0 8px 14px rgba(224,106,75,.3); }
  button.turn:disabled{ opacity:.55; cursor:default; transform:none; }
  button.turn:focus-visible, .keep:focus-visible{ outline:3px solid var(--sea); outline-offset:3px; }

  .counter{
    margin:14px auto 4px; text-align:center; font-weight:700; color:var(--ink);
    font-size:15px; background:rgba(255,255,255,.65); width:fit-content;
    padding:6px 18px; border-radius:999px; border:1.5px solid rgba(22,87,122,.18);
  }

  /* ---- collection shelf ---- */
  .shelf{
    display:flex; flex-wrap:wrap; gap:7px; justify-content:center;
    max-width:420px; margin:14px auto 130px; padding:0 18px; z-index:2; position:relative;
  }
  .shelf .slot{
    width:16px; height:16px; border-radius:50%;
    background:rgba(255,255,255,.5); border:2px solid rgba(22,87,122,.25);
    transition:all .3s;
  }
  .shelf .slot.got{
    background:linear-gradient(135deg,#fff 45%, var(--aqua) 46%);
    border-color:var(--sea); transform:scale(1.12);
    box-shadow:0 2px 6px rgba(11,50,71,.25);
  }
  .shelf .slot.coral.got{ background:linear-gradient(135deg,#fff 45%, var(--coral) 46%); }
  .shelf .slot.sun.got{ background:linear-gradient(135deg,#fff 45%, var(--sun) 46%); }

  /* ================= REVEAL OVERLAY ================= */
  .overlay{
    position:fixed; inset:0; z-index:10; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    background:rgba(11,50,71,.55); backdrop-filter:blur(7px);
  }
  .overlay.show{ display:flex; }

  .big-capsule{ position:relative; width:150px; height:150px; }
  .big-capsule .half{ position:absolute; left:0; width:150px; height:75px; transition:transform .5s cubic-bezier(.5,-.3,.4,1.4), opacity .5s; }
  .big-capsule .top{ top:0; border-radius:75px 75px 0 0;
    background:linear-gradient(180deg,#fff, #E8F8F6); border:4px solid rgba(255,255,255,.7); border-bottom:none; }
  .big-capsule .bottom{ bottom:0; border-radius:0 0 75px 75px;
    background:linear-gradient(180deg,var(--aqua), #2E9AA3); border:4px solid rgba(255,255,255,.7); border-top:none; }
  .big-capsule .shine{ position:absolute; top:16px; left:22px; width:34px; height:20px;
    border-radius:50%; background:rgba(255,255,255,.85); transform:rotate(-25deg); }
  .overlay.opening .big-capsule{ animation:wiggle .5s ease 2; }
  @keyframes wiggle{ 25%{transform:rotate(-7deg);} 75%{transform:rotate(7deg);} }
  .overlay.opened .big-capsule .top{ transform:translateY(-130px) rotate(-24deg); opacity:0; }
  .overlay.opened .big-capsule .bottom{ transform:translateY(130px) rotate(24deg); opacity:0; }

  /* polaroid card */
  .card{
    position:absolute; background:var(--shell); padding:14px 14px 18px;
    border-radius:6px; box-shadow:0 24px 60px rgba(5,30,45,.5);
    width:min(340px,86vw); transform:scale(.1) rotate(-6deg); opacity:0;
    transition:transform .55s cubic-bezier(.2,1.4,.4,1), opacity .4s;
  }
  .overlay.opened .card{ transform:scale(1) rotate(-2deg); opacity:1; transition-delay:.25s; }
  .card img{ width:100%; display:block; border-radius:3px; background:var(--foam); aspect-ratio:4/3; object-fit:cover; }
  .card .cap{
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700;
    text-align:center; margin-top:12px; font-size:16px; line-height:1.5; color:var(--ink);
  }
  .card .num{
    position:absolute; top:-13px; right:-11px; background:var(--coral); color:#fff;
    font-weight:700; font-size:13px; padding:5px 12px; border-radius:999px;
    box-shadow:0 4px 10px rgba(224,106,75,.5); transform:rotate(6deg);
    font-family:'Quicksand',sans-serif;
  }
  .keep{
    margin-top:26px; cursor:pointer; border:none; opacity:0; transition:opacity .4s .8s;
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:16px;
    color:var(--ink); background:var(--shell); padding:12px 34px; border-radius:999px;
    box-shadow:0 5px 0 rgba(180,170,150,.6);
  }
  .overlay.opened .keep{ opacity:1; }
  .keep:active{ transform:translateY(3px); box-shadow:0 2px 0 rgba(180,170,150,.6); }

  /* ---- complete banner ---- */
  .complete{
    display:none; text-align:center; z-index:2; position:relative; padding:0 20px;
  }
  .complete.show{ display:block; animation:pop .5s cubic-bezier(.2,1.4,.4,1); }
  @keyframes pop{ from{ transform:scale(.7); opacity:0; } }
  .complete h2{ font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:26px; color:var(--sea); }
  .complete p{ margin:8px 0 14px; font-weight:500; }
  .complete button{
    cursor:pointer; border:2px solid var(--sea); background:transparent; color:var(--sea);
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:15px;
    padding:10px 26px; border-radius:999px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.01s !important; transition-duration:.01s !important; }
    .bubble, .petal, .walker, .floaty, .sparkle{ display:none !important; }
  }

  /* ================= SAKURA PASSWORD GATE ================= */
  body.locked{ overflow:hidden; height:100vh; }
  #gate{
    position:fixed; inset:0; z-index:100; overflow:hidden;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:linear-gradient(180deg,#FFE3F0 0%, #FFC9E0 45%, #FFB3D2 100%);
    font-family:'Zen Maru Gothic','Quicksand',sans-serif;
    transition:opacity .8s, transform .8s;
  }
  #gate.unlocked{ opacity:0; transform:scale(1.08); pointer-events:none; }

  /* sakura branches in corners */
  .branch{ position:absolute; font-size:70px; filter:drop-shadow(0 4px 8px rgba(255,120,170,.3)); animation:branchSway 4s ease-in-out infinite; }
  @keyframes branchSway{ 50%{ transform:rotate(6deg) scale(1.05); } }

  /* falling petals */
  .petal{ position:absolute; top:-8vh; user-select:none; pointer-events:none;
    animation:fall linear infinite; z-index:1; }
  @keyframes fall{
    0%{ transform:translateY(0) translateX(0) rotate(0); opacity:0; }
    8%{ opacity:1; }
    50%{ transform:translateY(55vh) translateX(6vw) rotate(200deg); }
    100%{ transform:translateY(112vh) translateX(-4vw) rotate(400deg); opacity:.8; }
  }

  /* floating cute bits */
  .floaty{ position:absolute; user-select:none; pointer-events:none;
    animation:floatUp ease-in-out infinite; z-index:1; }
  @keyframes floatUp{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-26px) scale(1.18) rotate(8deg); }
  }
  .sparkle{ position:absolute; user-select:none; pointer-events:none;
    animation:twinkle 1.6s ease-in-out infinite; z-index:1; }
  @keyframes twinkle{ 0%,100%{ opacity:.15; transform:scale(.6) rotate(0);} 50%{ opacity:1; transform:scale(1.3) rotate(20deg);} }

  /* duck & goose parade */
  .walker{ position:absolute; user-select:none; pointer-events:none; z-index:3;
    display:flex; gap:2px; align-items:flex-end; will-change:transform; }
  .walker span{ display:inline-block; animation:waddle .45s ease-in-out infinite alternate; }
  .walker span:nth-child(2n){ animation-delay:.22s; }
  @keyframes waddle{ from{ transform:rotate(-9deg) translateY(0);} to{ transform:rotate(9deg) translateY(-5px);} }

  /* the lock card */
  .lock-card{
    position:relative; z-index:5; text-align:center;
    background:rgba(255,255,255,.82); backdrop-filter:blur(6px);
    border:3px solid #FF9EC7; border-radius:34px;
    padding:34px 30px 30px; width:min(370px,88vw);
    box-shadow:0 20px 50px rgba(255,110,165,.35), 0 0 0 8px rgba(255,255,255,.35);
    animation:cardBob 3s ease-in-out infinite;
  }
  @keyframes cardBob{ 50%{ transform:translateY(-8px); } }
  .lock-card .lock-emoji{ font-size:52px; display:inline-block; animation:floatUp 2.2s ease-in-out infinite; }
  .lock-card h2{ font-weight:900; font-size:26px; color:#E14E8A; margin-top:4px; }
  .lock-card .hint{
    margin:10px auto 16px; font-weight:700; font-size:15px; color:#B23A6E;
    background:#FFE3F0; border:2px dashed #FF9EC7; border-radius:999px;
    padding:8px 18px; width:fit-content;
  }
  .lock-card input{
    width:100%; text-align:center; font-family:inherit; font-weight:700;
    font-size:22px; color:#B23A6E; letter-spacing:.2em;
    padding:12px; border-radius:18px; border:3px solid #FFB7D5;
    background:#FFF6FA; outline:none; transition:border-color .2s, box-shadow .2s;
  }
  .lock-card input:focus{ border-color:#E14E8A; box-shadow:0 0 0 5px rgba(255,158,199,.35); }
  .lock-card button{
    margin-top:14px; width:100%; cursor:pointer; border:none;
    font-family:inherit; font-weight:900; font-size:18px; letter-spacing:.08em;
    color:#fff; background:linear-gradient(180deg,#FF8FBE,#E14E8A);
    padding:13px; border-radius:999px;
    box-shadow:0 6px 0 #C23771, 0 12px 24px rgba(225,78,138,.35);
    transition:transform .12s, box-shadow .12s;
  }
  .lock-card button:active{ transform:translateY(4px); box-shadow:0 2px 0 #C23771; }
  .lock-card button:focus-visible, .lock-card input:focus-visible{ outline:3px solid #E14E8A; outline-offset:2px; }
  .lock-msg{ min-height:24px; margin-top:12px; font-weight:700; font-size:15px; color:#E14E8A; }
  .lock-card.wrong{ animation:wrongShake .5s ease; }
  @keyframes wrongShake{
    20%{ transform:translateX(-12px) rotate(-2deg);} 40%{ transform:translateX(12px) rotate(2deg);}
    60%{ transform:translateX(-8px);} 80%{ transform:translateX(8px);}
  }
  /* success petal burst */
  .burst{ position:fixed; z-index:110; font-size:26px; pointer-events:none;
    animation:burstFly 1.1s ease-out forwards; }
  @keyframes burstFly{ to{ transform:translate(var(--bx),var(--by)) rotate(540deg); opacity:0; } }
</style>
</head>
<body class="locked">
  <!-- ============ SAKURA PASSWORD GATE ============ -->
  <div id="gate">
    <div class="branch" style="top:-14px; left:-10px;">🌸🌸</div>
    <div class="branch" style="top:-10px; right:-8px; animation-delay:1.2s;">🌸🌸</div>
    <div class="branch" style="bottom:120px; left:-14px; animation-delay:2s;">🌷</div>
    <div class="branch" style="bottom:150px; right:-6px; animation-delay:.6s;">💮</div>

    <div class="lock-card" id="lockCard">
      <span class="lock-emoji">🌸🔒🌸</span>
      <h2>ひみつのページ！</h2>
      <div style="font-weight:700; color:#B23A6E; font-size:14px;">This page is a secret… prove it's you!</div>
      <div class="hint">🎂 Hint: your age this year</div>
      <input type="password" id="pwInput" inputmode="numeric" autocomplete="off"
             placeholder="・・・" aria-label="Password">
      <button id="pwBtn">はいる · ENTER 🌸</button>
      <div class="lock-msg" id="pwMsg"></div>
    </div>
  </div>

  <div class="sea-floor" aria-hidden="true"></div>

  <header>
    <div class="eyebrow"><span class="jp">沖縄・海の記憶</span> · OKINAWA TIDE</div>
    <h1>おもいで<span class="accent">ガチャ</span></h1>
    <div class="sub">Turn the crank. The sea gives back one memory at a time.</div>
  </header>

  <div class="stage">
    <!-- Gacha machine -->
    <svg class="machine" id="machine" viewBox="0 0 300 430" xmlns="http://www.w3.org/2000/svg" aria-label="Gacha machine">
      <defs>
        <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
          <stop offset="1" stop-color="#D8F3F0" stop-opacity=".75"/>
        </linearGradient>
        <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#FFF6E6"/>
          <stop offset="1" stop-color="#F3E3C8"/>
        </linearGradient>
        <linearGradient id="baseG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1B6E96"/>
          <stop offset="1" stop-color="#0B3247"/>
        </linearGradient>
      </defs>

      <!-- base -->
      <rect x="52" y="392" width="196" height="26" rx="12" fill="#0B3247" opacity=".9"/>
      <!-- body -->
      <rect x="62" y="208" width="176" height="196" rx="26" fill="url(#bodyG)" stroke="#E4CFA8" stroke-width="3"/>
      <!-- seigaiha band on body (subtle) -->
      <g opacity=".5">
        <path d="M62 340 a16 16 0 0 1 32 0 a16 16 0 0 1 32 0 a16 16 0 0 1 32 0 a16 16 0 0 1 32 0 a16 16 0 0 1 32 0 a16 16 0 0 1 16 -0.01 V404 a26 26 0 0 1 -26 26 H88 a26 26 0 0 1 -26 -26 Z" fill="#BFE8E2"/>
        <path d="M78 340 a16 16 0 0 1 32 0 M110 340 a16 16 0 0 1 32 0 M142 340 a16 16 0 0 1 32 0 M174 340 a16 16 0 0 1 32 0" stroke="#8ED4CC" stroke-width="2.5" fill="none"/>
        <path d="M62 356 a16 16 0 0 1 32 0 M94 356 a16 16 0 0 1 32 0 M126 356 a16 16 0 0 1 32 0 M158 356 a16 16 0 0 1 32 0 M190 356 a16 16 0 0 1 32 0" stroke="#8ED4CC" stroke-width="2.5" fill="none"/>
      </g>

      <!-- hibiscus (subtle okinawa mark) -->
      <g transform="translate(150 236) scale(.85)">
        <g fill="#FF8B6A" stroke="#E06A4B" stroke-width="1.6">
          <ellipse rx="9" ry="15" transform="rotate(0) translate(0 -13)"/>
          <ellipse rx="9" ry="15" transform="rotate(72) translate(0 -13)"/>
          <ellipse rx="9" ry="15" transform="rotate(144) translate(0 -13)"/>
          <ellipse rx="9" ry="15" transform="rotate(216) translate(0 -13)"/>
          <ellipse rx="9" ry="15" transform="rotate(288) translate(0 -13)"/>
        </g>
        <circle r="5" fill="#F0C987"/>
        <line x1="0" y1="0" x2="10" y2="-22" stroke="#F0C987" stroke-width="2.4"/>
      </g>

      <!-- dome collar -->
      <rect x="52" y="188" width="196" height="26" rx="13" fill="url(#baseG)"/>
      <!-- glass dome -->
      <path d="M66 196 a84 84 0 0 1 168 0 z" fill="url(#glass)" stroke="#ffffff" stroke-width="4"/>

      <!-- capsules inside dome (ryukyu glass floats) -->
      <g id="floats">
        <g><circle cx="112" cy="160" r="21" fill="#5BC8CE"/><path d="M91 160 a21 21 0 0 1 42 0 z" fill="#fff" opacity=".85"/></g>
        <g><circle cx="156" cy="168" r="21" fill="#FF8B6A"/><path d="M135 168 a21 21 0 0 1 42 0 z" fill="#fff" opacity=".85"/></g>
        <g><circle cx="196" cy="156" r="19" fill="#F0C987"/><path d="M177 156 a19 19 0 0 1 38 0 z" fill="#fff" opacity=".85"/></g>
        <g><circle cx="134" cy="126" r="18" fill="#16577A"/><path d="M116 126 a18 18 0 0 1 36 0 z" fill="#fff" opacity=".85"/></g>
        <g><circle cx="174" cy="122" r="17" fill="#5BC8CE"/><path d="M157 122 a17 17 0 0 1 34 0 z" fill="#fff" opacity=".85"/></g>
        <g><circle cx="150" cy="93" r="14" fill="#FF8B6A"/><path d="M136 93 a14 14 0 0 1 28 0 z" fill="#fff" opacity=".85"/></g>
      </g>
      <!-- dome shine -->
      <path d="M84 150 q10 -52 58 -62" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" opacity=".8"/>

      <!-- crank -->
      <g id="crank" style="transform-origin:150px 262px;">
        <circle cx="150" cy="262" r="26" fill="#1B6E96" stroke="#0B3247" stroke-width="3"/>
        <rect x="144" y="240" width="12" height="44" rx="6" fill="#F6EFE3"/>
        <circle cx="150" cy="262" r="7" fill="#F6EFE3"/>
      </g>

      <!-- exit chute -->
      <rect x="112" y="300" width="76" height="10" rx="5" fill="#0B3247" opacity=".18"/>
      <path d="M118 372 h64 a8 8 0 0 1 8 8 v14 h-80 v-14 a8 8 0 0 1 8 -8" fill="#0B3247" opacity=".85"/>
      <rect x="122" y="378" width="56" height="18" rx="6" fill="#062334"/>
    </svg>

    <!-- dropping capsule -->
    <svg id="dropCapsule" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="32" cy="32" r="30" fill="#5BC8CE" stroke="#fff" stroke-width="3"/>
      <path d="M2 32 a30 30 0 0 1 60 0 z" fill="#fff" opacity=".9"/>
      <ellipse cx="22" cy="18" rx="8" ry="5" fill="#fff"/>
    </svg>
  </div>

  <div class="press-hint" id="hint">コインをいれて · Ready when you are</div>
  <button class="turn" id="turnBtn">まわす · TURN</button>
  <div class="counter"><span id="count">0</span> / <span id="total">30</span> memories found</div>
  <div class="shelf" id="shelf" aria-label="Collection progress"></div>

  <div class="complete" id="complete">
    <h2>コンプリート！ Collection complete 🌺</h2>
    <p>Every memory has washed ashore.</p>
    <button id="restart">もういちど · Start over</button>
  </div>

  <!-- reveal overlay -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Memory revealed">
    <div class="big-capsule" id="bigCapsule">
      <div class="half top"><div class="shine"></div></div>
      <div class="half bottom"></div>
      <div class="card" id="card">
        <div class="num" id="cardNum"></div>
        <img id="cardImg" src="" alt="Memory photo">
        <div class="cap" id="cardCap"></div>
      </div>
    </div>
    <button class="keep" id="keepBtn">しまう · Keep it</button>
  </div>

<script>
/* ================= SAKURA GATE ================= */
(function(){
  const gate = document.getElementById("gate");
  const card = document.getElementById("lockCard");
  const input = document.getElementById("pwInput");
  const btn = document.getElementById("pwBtn");
  const msg = document.getElementById("pwMsg");
  const ANSWER = "26";
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

  // already unlocked this session?
  let open = false;
  try { open = sessionStorage.getItem("gachaGate") === "open"; } catch(e){}
  if (open){ unlock(true); }

  /* ---- falling petals ---- */
  const petalChars = ["🌸","🌸","🌸","💮","🩷","✿"];
  if (!reduce) for (let i=0;i<26;i++){
    const p = document.createElement("div");
    p.className = "petal";
    p.textContent = petalChars[i % petalChars.length];
    p.style.cssText = `left:${Math.random()*100}vw; font-size:${13+Math.random()*22}px;
      animation-duration:${6+Math.random()*8}s; animation-delay:${Math.random()*9}s;`;
    gate.appendChild(p);
  }

  /* ---- floating cuties ---- */
  const floaties = ["🐣","💖","🎀","🍡","🧁","🐰","🍓","🫧","🌷","🐥"];
  if (!reduce) floaties.forEach((f,i)=>{
    const d = document.createElement("div");
    d.className = "floaty";
    d.textContent = f;
    d.style.cssText = `left:${5+Math.random()*90}vw; top:${8+Math.random()*74}vh;
      font-size:${22+Math.random()*22}px; animation-duration:${2+Math.random()*2.5}s;
      animation-delay:${Math.random()*2}s; opacity:.9;`;
    gate.appendChild(d);
  });

  /* ---- sparkles ---- */
  if (!reduce) for (let i=0;i<14;i++){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.textContent = Math.random() > .5 ? "✨" : "⭐";
    s.style.cssText = `left:${Math.random()*96}vw; top:${Math.random()*92}vh;
      font-size:${12+Math.random()*16}px; animation-delay:${Math.random()*1.6}s;`;
    gate.appendChild(s);
  }

  /* ---- duck & goose parade ---- */
  const flocks = [
    ["🦆"], ["🪿"], ["🦆","🐥","🐥","🐥"], ["🪿","🪿"], ["🦆","🦆"],
    ["🐥","🐥"], ["🪿","🐥"], ["🦆"], ["🪿"], ["🦆","🐥"]
  ];
  function spawnWalker(initial){
    if (reduce || gate.classList.contains("unlocked")) return;
    const w = document.createElement("div");
    w.className = "walker";
    const flock = flocks[Math.floor(Math.random()*flocks.length)];
    const size = 26 + Math.random()*34;
    const ltr = Math.random() > .5;           // left-to-right?
    flock.forEach(ch=>{
      const s = document.createElement("span");
      s.textContent = ch;
      s.style.fontSize = size + "px";
      if (ltr) s.style.transform = "scaleX(-1)"; // birds face left by default
      w.appendChild(s);
    });
    const bottom = 1 + Math.random()*16;       // several walking lanes
    const dur = 9 + Math.random()*11;
    w.style.bottom = bottom + "vh";
    w.style.left = ltr ? "-160px" : "100vw";
    gate.appendChild(w);
    const dist = innerWidth + 340;
    const anim = w.animate(
      [{ transform:"translateX(0)" },
       { transform:`translateX(${ltr ? dist : -dist}px)` }],
      { duration: dur*1000, delay: initial ? Math.random()*4000 : 0, easing:"linear" }
    );
    anim.onfinish = ()=> w.remove();
  }
  for (let i=0;i<7;i++) spawnWalker(true);
  const walkerTimer = setInterval(()=> spawnWalker(false), 2600);

  /* ---- password logic ---- */
  const wrongLines = [
    "ぶっぶー！🦆 Quack! That's not it…",
    "🪿 HONK! The goose says no.",
    "ちがうよ〜 🐥 try again!",
    "🌸 So close… maybe? Not really. Again!"
  ];
  let wrongCount = 0;
  function check(){
    if (input.value.trim() === ANSWER){
      msg.textContent = "せいかい！🎉 Welcome in!";
      try { sessionStorage.setItem("gachaGate","open"); } catch(e){}
      // petal burst from the card
      if (!reduce){
        const r = card.getBoundingClientRect();
        for (let i=0;i<24;i++){
          const b = document.createElement("div");
          b.className = "burst";
          b.textContent = ["🌸","💮","✨","💖"][i%4];
          b.style.left = (r.left + r.width/2) + "px";
          b.style.top  = (r.top + r.height/2) + "px";
          b.style.setProperty("--bx", (Math.random()*520-260)+"px");
          b.style.setProperty("--by", (Math.random()*520-260)+"px");
          document.body.appendChild(b);
          setTimeout(()=> b.remove(), 1200);
        }
      }
      setTimeout(unlock, reduce ? 50 : 700);
    } else {
      card.classList.remove("wrong");
      void card.offsetWidth; // restart animation
      card.classList.add("wrong");
      msg.textContent = wrongLines[wrongCount++ % wrongLines.length];
      input.value = "";
      input.focus();
    }
  }
  function unlock(instant){
    gate.classList.add("unlocked");
    document.body.classList.remove("locked");
    clearInterval(walkerTimer);
    setTimeout(()=> gate.remove(), instant ? 0 : 900);
  }
  btn.addEventListener("click", check);
  input.addEventListener("keydown", e=>{ if (e.key === "Enter") check(); });
  if (!open) input.focus();
})();
</script>

<script src="photos.js"></script>
<script>
(function(){
  const total = PHOTOS.length;
  const KEY = "memoryGachaIndex";
  let idx = 0, busy = false;
  try { idx = Math.min(parseInt(localStorage.getItem(KEY)) || 0, total); } catch(e){}

  const $ = id => document.getElementById(id);
  const shelf = $("shelf");
  const capsuleColors = ["", "coral", "sun"];
  for (let i = 0; i < total; i++){
    const d = document.createElement("div");
    d.className = "slot " + capsuleColors[i % 3];
    shelf.appendChild(d);
  }
  $("total").textContent = total;

  function sync(){
    $("count").textContent = idx;
    [...shelf.children].forEach((s,i)=> s.classList.toggle("got", i < idx));
    const done = idx >= total;
    $("turnBtn").style.display = done ? "none" : "block";
    $("hint").style.display = done ? "none" : "block";
    $("complete").classList.toggle("show", done);
  }
  function save(){ try{ localStorage.setItem(KEY, idx); }catch(e){} }

  // ambient bubbles
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (!reduce) for (let i=0;i<9;i++){
    const b = document.createElement("div");
    b.className = "bubble";
    const s = 8 + Math.random()*20;
    b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}vw;animation-duration:${9+Math.random()*10}s;animation-delay:${Math.random()*10}s`;
    document.body.appendChild(b);
  }

  const crank = $("crank"), machine = $("machine"), drop = $("dropCapsule");

  $("turnBtn").addEventListener("click", ()=>{
    if (busy || idx >= total) return;
    busy = true;
    $("turnBtn").disabled = true;
    $("hint").textContent = "コロコロ…";

    // spin crank + shake
    crank.animate([{transform:"rotate(0deg)"},{transform:"rotate(360deg)"}],
      {duration: reduce? 10:700, easing:"cubic-bezier(.4,0,.6,1)"});
    machine.classList.add("shake");
    setTimeout(()=> machine.classList.remove("shake"), 550);

    // preload photo
    const item = PHOTOS[idx];
    const img = new Image();
    img.src = "photos/" + item.file;

    // capsule drops
    setTimeout(()=>{
      drop.classList.add("dropping");
    }, reduce? 10:450);

    // open overlay
    setTimeout(()=> reveal(item), reduce? 60:1650);
  });

  function reveal(item){
    drop.classList.remove("dropping");
    $("cardImg").src = "photos/" + item.file;
    $("cardImg").alt = item.caption;
    $("cardCap").textContent = item.caption;
    $("cardNum").textContent = "No." + (idx+1);
    const ov = $("overlay");
    ov.classList.add("show","opening");
    ov.classList.remove("opened");
    setTimeout(()=>{
      ov.classList.remove("opening");
      ov.classList.add("opened");
    }, reduce? 30:1050);
  }

  $("keepBtn").addEventListener("click", ()=>{
    $("overlay").classList.remove("show","opened","opening");
    idx++;
    save(); sync();
    busy = false;
    $("turnBtn").disabled = false;
    $("hint").textContent = idx >= total ? "" :
      ["つぎはなにかな？ · What's next?","もういっかい？ · One more?","波がよんでいる · The tide is calling"][idx % 3];
  });

  $("restart").addEventListener("click", ()=>{
    idx = 0; save(); sync();
    $("hint").textContent = "コインをいれて · Ready when you are";
  });

  sync();
})();
</script>
</body>
</html>
